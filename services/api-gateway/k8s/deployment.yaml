apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  labels:
    app: api-gateway

spec:

  replicas: 1

  selector:
    matchLabels:
      app: api-gateway


  template:

    metadata:
      labels:
        app: api-gateway


    spec:

      imagePullSecrets:
      - name: jfrog-secret


      containers:

      - name: api-gateway

        image: hiqode01.jfrog.io/akash-docker/cicd-app/api-gateway:V-1.0.0-4

        imagePullPolicy: IfNotPresent

        ports:

        - containerPort: 8080


        readinessProbe:

          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 3
          periodSeconds: 10


        livenessProbe:

          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 20
